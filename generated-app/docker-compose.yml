services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: ./server
    environment:
      SERVER_PORT: ${SERVER_PORT}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - db
    ports:
      - "${SERVER_PORT}:8080"

  web:
    build: ./web
    environment:
      - VITE_API_BASE=${VITE_API_BASE}
    depends_on:
      - server
    ports:
      - "5173:5173"

volumes:
  pgdata:
